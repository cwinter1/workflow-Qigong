function phaseSeconds(totalMin) {
  const s = PROGRAM.phaseShare, total = totalMin * 60;
  const out = {};
  Object.keys(s).forEach(id => { out[id] = Math.round(total * s[id]); });
  return out;
}

function buildTimeline(dayIdx, week, totalMin) {
  const day = PROGRAM.days[dayIdx];
  const totals = phaseSeconds(totalMin);
  const out = [];
  day.phases.forEach((ph, pi) => {
    const each = Math.max(20, Math.round(totals[ph.id] / ph.exercises.length));
    ph.exercises.forEach((ex, ei) => {
      out.push({ phaseIdx:pi, phaseId:ph.id, phaseName:ph.name, intent:ph.intent,
        exIdx:ei, exName:ex.name, variant:ex.variants[week-1], seconds:each, kind:'exercise' });
    });
  });
  return out;
}

async function acquireWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      _wakeLock = await navigator.wakeLock.request('screen');
      _wakeLock.addEventListener('release', () => { _wakeLock = null; });
      return;
    }
  } catch {}
  try { _ensureNoSleepVideo(); await _noSleepVideo.play(); } catch {}
}
function releaseWakeLock() {
  try { if (_wakeLock) { _wakeLock.release(); _wakeLock = null; } } catch {}
  try { if (_noSleepVideo) _noSleepVideo.pause(); } catch {}
}

  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  return _audioCtx;
}

// ═══════════════════════════════════════════════════════
// SESSION HISTORY STORAGE
// ═══════════════════════════════════════════════════════
function loadSessions()  { try { return JSON.parse(localStorage.getItem('qf.sessions') || '[]'); } catch { return []; } }
function saveSessions(s) { try { localStorage.setItem('qf.sessions', JSON.stringify(s)); } catch {} }

function getStreak() {
  const sessions = loadSessions();
  if (!sessions.length) return 0;
  const dayKeys = [...new Set(sessions.map(s => {
    const d = new Date(s.at);
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }))].sort();
  const last = new Date(sessions[sessions.length - 1].at);
  const today = new Date(); today.setHours(0,0,0,0); last.setHours(0,0,0,0);
  if ((today - last) / 86400000 > 1) return 0;
  let streak = 1;
  for (let i = dayKeys.length - 2; i >= 0; i--) {
    const a = dayKeys[i].split('-').map(Number);
    const b = dayKeys[i+1].split('-').map(Number);
    const da = new Date(a[0], a[1], a[2]);
    const db = new Date(b[0], b[1], b[2]);
    if ((db - da) / 86400000 === 1) streak++;
    else break;
  }
  return streak;
}

function pickMessage(streak, week, dayTag, total) {
  if (total === 1)   return "First one done. The rest builds from here.";
  if (total === 12)  return "Twelve sessions. The whole program, done.";
  if (streak === 21) return "Twenty-one mornings straight. This is just how mornings work now.";
  if (streak === 14) return "Two weeks without a gap. The practice found its footing.";
  if (streak === 10) return "Ten straight mornings. That's not effort anymore — that's rhythm.";
  if (streak === 7)  return "A full week unbroken.";
  if (streak === 5)  return "Five in a row. The body's starting to expect this.";
  if (streak === 3)  return "Three straight mornings.";
  if (streak === 2)  return "Two in a row. The second one is the one that counts.";

  const combo = `${week}-${dayTag}`;
  const comboMessages = {
    '1-BADUANJIN': "Week one of the eight pieces. The order is the whole point — trust it before you rush it.",
    '2-BADUANJIN': "Second week through the set. The sequence should start to feel like one motion now, not eight separate ones.",
    '3-BADUANJIN': "Third week. The holds go deeper because you're not thinking about what comes next anymore.",
    '4-BADUANJIN': "Final week of the program. Eight movements, twelve sessions, the same set the whole way through.",
  };
  if (comboMessages[combo]) return comboMessages[combo];

  const pool = [
    "Qigong doesn't ask for effort. It asks for attention.",
    "Eight pieces, same order, every time. The repetition is the point, not a limitation.",
    "You don't build calm in the practice. You build it in how it stays with you after.",
    "Twenty minutes of this is worth more than an hour you only do twice a month.",
    "The body settles into what you consistently ask of it. You're asking.",
    "Consistency without intensity beats intensity without consistency. Every time.",
    "Done. Another morning you'll never have to start cold again.",
    "Quiet work. No performance. This is what it looks like.",
    "The streak is a byproduct. The breath is the thing.",
    `${total} sessions. You keep arriving.`,
    "Another one in the books. It adds up whether you feel it today or not.",
    "Not every session feels settled. This one counts the same.",
    "The gap between wanting to and doing it is exactly this — twenty minutes, this morning.",
    "One more session behind you. That's the whole practice.",
  ];
  return pool[total % pool.length];
}

async function shareSession(streak, total, duration) {
  const day = PROGRAM.days[state.day];
  const text = `${Math.round(duration / 60)} min ${day.tag.toLowerCase()} practice — week ${state.week}, day ${state.day + 1}. ${streak >= 2 ? streak + ' day streak. ' : ''}${total} sessions total.`;
  if (navigator.share) {
    try { await navigator.share({ title: 'Q·Flow', text }); return 'shared'; } catch { return null; }
  }
  try { await navigator.clipboard.writeText(text); return 'copied'; } catch { return null; }
}

// ═══════════════════════════════════════════════════════
// SESSION START
// ═══════════════════════════════════════════════════════
function startSession() {
  clearInterval(timerInterval);
  try {
    const ctx = getAudioCtx();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
  } catch {}
  state.timeline = buildTimeline(state.day, state.week, SESSION_MIN);
  state.idx = 0;
  state.left = state.timeline[0].seconds;
  state.paused = false;
  state.startedAt = Date.now();
  state.view = 'preview';
  acquireWakeLock();
  render();
}

function pickDay(w, d) {
  state.week = w; state.day = d;
  startSession();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (state.paused) return;
    state.left--;
    if (state.left <= 0) {
      clearInterval(timerInterval);
      beep();
      if (state.idx + 1 < state.timeline.length) {
        state.idx++;
        state.left = state.timeline[state.idx].seconds;
        state.view = 'preview';
        render();
      } else {
        finishSession();
      }
    } else {
      if (state.left <= 10 && state.left > 0) beepTick(state.left <= 3 ? 880 : 440);
      updateTimerDisplay();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const cur = state.timeline[state.idx];

  const numEl = document.getElementById('timer-num');
  if (numEl) numEl.textContent = fmt(state.left);

  const progEl = document.getElementById('session-prog');
  if (progEl) {
    const totalSec = state.timeline.reduce((a, t) => a + t.seconds, 0);
    const doneSec = state.timeline.slice(0, state.idx).reduce((a, t) => a + t.seconds, 0) + (cur.seconds - state.left);
    progEl.style.width = `${(doneSec / totalSec) * 100}%`;
  }
}

  pauseBtn.innerHTML = `${state.paused ? iconPlay(T.bg) : iconPause(T.bg)} ${state.paused ? 'Resume' : 'Pause'}`;
  pauseBtn.onclick = togglePause;
  const skipBtn = el('button', `flex:1;appearance:none;background:transparent;border:1px solid ${T.hairline};color:${T.fg};border-radius:6px;padding:18px;font-family:${T.display};font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;justify-content:center;gap:8px;`);
  skipBtn.innerHTML = `${iconNext(T.fg)} Skip`;
  skipBtn.onclick = skipExercise;
  ctrls.append(pauseBtn, skipBtn);
  return ctrls;
}

function togglePause() {
  state.paused = !state.paused;
  const btn = document.getElementById('pause-btn');
  if (btn) btn.innerHTML = `${state.paused ? iconPlay(T.bg) : iconPause(T.bg)} ${state.paused ? 'Resume' : 'Pause'}`;
}

function skipExercise() {
  clearInterval(timerInterval);
  if (state.idx + 1 < state.timeline.length) {
    state.idx++;
    state.left = state.timeline[state.idx].seconds;
    state.view = 'preview';
    render();
  } else {
    finishSession();
  }
}

function abortSession() {
  clearInterval(timerInterval);
  releaseWakeLock();
  const ns2 = nextSession();
  state.week = ns2.week; state.day = ns2.day;
  state.view = 'home';
  render();
}

function finishSession() {
  clearInterval(timerInterval);
  releaseWakeLock();
  const key = `w${state.week}d${state.day}`;
  const now = Date.now();
  const duration = state.startedAt ? Math.round((now - state.startedAt) / 1000) : SESSION_MIN * 60;
  state.progress[key] = { done: true, at: now };
  saveProgress();
  const sessions = loadSessions();
  sessions.push({ key, at: now, duration, week: state.week, day: state.day, dayTitle: PROGRAM.days[state.day].title, dayTag: PROGRAM.days[state.day].tag });
  saveSessions(sessions);
  state.lastDuration = duration;
  state.view = 'done';
  render();
}

  const msg = pickMessage(streak, state.week, dayTag, total);

  const scroll = el('div', `flex:1;overflow-y:auto;padding:calc(env(safe-area-inset-top,12px)+36px) 22px 0;`);
  const body = el('div', `display:flex;flex-direction:column;gap:24px;`);

  const top = el('div', `display:flex;flex-direction:column;gap:10px;`);
  const tag = el('div', `font-family:${T.mono_ff};font-size:11px;color:${T.accent};letter-spacing:2px;text-transform:uppercase;`);
  tag.textContent = 'Practice complete';
  const msgDiv = el('div', `font-family:"Instrument Serif",serif;font-size:38px;line-height:1.15;color:${T.fg};font-style:italic;`);
  msgDiv.textContent = msg;
  top.append(tag, msgDiv);

  if (streak >= 2) {
    const badge = el('div', `display:flex;align-items:center;gap:14px;padding:16px 18px;background:${T.card};border:1px solid ${T.accent}44;border-radius:8px;`);
    const num = el('div', `font-family:${T.display};font-size:48px;font-weight:700;color:${T.accent};line-height:1;`);
    num.textContent = streak;
    const right = el('div', ``);
    const lbl = el('div', `font-family:${T.mono_ff};font-size:10px;color:${T.accent};letter-spacing:2px;text-transform:uppercase;`);
    lbl.textContent = 'Day streak';
    const sub = el('div', `font-size:13px;color:${T.sub};margin-top:4px;`);
    sub.textContent = streak === 2 ? 'Two in a row. Keep it going.' :
                      streak === 3 ? 'Three straight. The pattern is set.' :
                      streak === 7 ? 'A full week without missing.' :
                      "Don't break the chain.";
    right.append(lbl, sub);
    badge.append(num, right);
    body.appendChild(top);
    body.appendChild(badge);
  } else {
    body.appendChild(top);
  }

  const stats = el('div', `display:flex;flex-direction:column;gap:8px;`);
  const durationMin = Math.round(duration / 60);
  [
    ['Duration', `${durationMin} min`],
    ['Session',  `Week ${state.week} · Day ${state.day + 1}`],
    ['Program',  `${total} of 12 done`],
  ].forEach(([k, v]) => stats.appendChild(renderStat(k, v)));
  body.appendChild(stats);

  let sessionRating = null;
  const ratingCard = el('div', `background:${T.card};border:1px solid ${T.hairline};border-radius:8px;padding:14px 16px;`);
  const ratingHdr = el('div', `font-family:${T.mono_ff};font-size:10px;color:${T.mono};letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;`);
  ratingHdr.textContent = 'How settled did it feel?';
  const ratingRow = el('div', `display:flex;gap:8px;`);
  [1,2,3,4,5].forEach(n => {
    const btn = el('button', `flex:1;appearance:none;border:1px solid ${T.hairline};background:transparent;color:${T.sub};border-radius:6px;padding:10px 0;font-family:${T.display};font-weight:700;font-size:18px;`);
    btn.textContent = n;
    btn.onclick = () => {
      sessionRating = n;
      ratingRow.querySelectorAll('button').forEach((b, i) => {
        b.style.background = i + 1 === n ? T.accent : 'transparent';
        b.style.color = i + 1 === n ? T.accentT : T.sub;
        b.style.border = `1px solid ${i + 1 === n ? T.accent : T.hairline}`;
      });
    };
    ratingRow.appendChild(btn);
  });
  ratingCard.append(ratingHdr, ratingRow);
  body.appendChild(ratingCard);

  body.appendChild(el('div', `height:24px;`));
  scroll.appendChild(body);

  const ctaWrap = el('div', `padding:14px 22px;padding-bottom:calc(env(safe-area-inset-bottom,14px)+14px);display:flex;gap:10px;flex-shrink:0;`);

  const shareBtn = el('button', `flex:1;appearance:none;border:1px solid ${T.hairline};background:transparent;color:${T.fg};border-radius:6px;padding:18px;font-family:${T.display};font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:0.5px;`);
  shareBtn.textContent = 'Share';
  shareBtn.onclick = async () => {
    const orig = shareBtn.textContent;
    shareBtn.disabled = true;
    const result = await shareSession(streak, total, duration);
    shareBtn.textContent = result === 'copied' ? 'Copied' : orig;
    setTimeout(() => { shareBtn.textContent = orig; shareBtn.disabled = false; }, 1500);
  };

  const continueBtn = el('button', `flex:2;appearance:none;border:none;background:${T.accent};color:${T.accentT};border-radius:6px;padding:18px 22px;font-family:${T.display};font-weight:700;font-size:16px;text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;justify-content:center;gap:10px;`);
  continueBtn.innerHTML = `${iconCheck(T.accentT)} Continue`;
  continueBtn.onclick = () => {
    if (sessionRating != null) {
      const sessions = loadSessions();
      const si = sessions.findIndex(s => s.key === sessionKey && s.at === (sessions[sessions.length - 1]?.key === sessionKey ? sessions[sessions.length - 1].at : s.at));
      const lastIdx = sessions.length - 1;
      if (lastIdx >= 0 && sessions[lastIdx].key === sessionKey) { sessions[lastIdx].rating = sessionRating; saveSessions(sessions); }
    }
    const ns2 = nextSession();
    state.week = ns2.week; state.day = ns2.day;
    state.view = 'home';
    render();
  };
  ctaWrap.append(shareBtn, continueBtn);

  root.append(scroll, ctaWrap);
}

// ═══════════════════════════════════════════════════════
// PROGRAM
// ═══════════════════════════════════════════════════════
function renderProgram(root) {
  const hdr = el('div', `padding:calc(env(safe-area-inset-top,12px)+12px) 22px 12px;display:flex;align-items:center;gap:14px;flex-shrink:0;`);
  const backBtn = el('button', `appearance:none;border:1px solid ${T.hairline};background:transparent;color:${T.fg};width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;`);
  backBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" stroke="${T.fg}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,2 4,7 10,12"/></svg>`;
  backBtn.onclick = () => { state.view = 'home'; render(); };
  const title = el('div', `font-family:${T.display};font-weight:700;font-size:22px;text-transform:uppercase;letter-spacing:0.5px;`);
  title.textContent = '4-Week Program';
  hdr.append(backBtn, title);

  const scroll = el('div', `flex:1;overflow-y:auto;padding:0 22px;`);
  const body = el('div', `display:flex;flex-direction:column;gap:28px;padding-bottom:40px;margin-top:8px;`);

  // All 3 weekly sessions are the same Baduanjin set, so the breakdown is
  // shown once rather than repeated identically per day slot.
  const day = PROGRAM.days[0];
  const daySection = el('div', ``);
  const dayHdr = el('div', `margin-bottom:14px;`);
  const dayTag = el('div', `font-family:${T.mono_ff};font-size:10px;color:${T.accent};letter-spacing:2px;text-transform:uppercase;`);
  dayTag.textContent = `${day.tag} · Practiced 3× a week`;
  const dayTitle = el('div', `font-family:${T.display};font-weight:700;font-size:28px;text-transform:uppercase;letter-spacing:-0.5px;line-height:1;margin-top:4px;`);
  dayTitle.textContent = day.title;
  const daySub = el('div', `font-family:${T.mono_ff};font-size:11px;color:${T.mono};margin-top:4px;letter-spacing:1px;`);
  daySub.textContent = day.kicker;
  dayHdr.append(dayTag, dayTitle, daySub);

  const phaseList = el('div', `display:flex;flex-direction:column;gap:6px;`);
  day.phases.forEach((ph, pi) => {
    const phCard = el('div', `background:${T.card};border:1px solid ${T.hairline};border-radius:6px;padding:14px;`);
    const phHdr = el('div', `display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;`);
    const phName = el('div', `font-family:${T.display};font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:0.5px;`);
    phName.textContent = `${pi + 1}. ${ph.name}`;
    const phIntent = el('div', `font-family:${T.mono_ff};font-size:10px;color:${T.mono};letter-spacing:0.5px;max-width:200px;text-align:right;`);
    phIntent.textContent = ph.intent;
    phHdr.append(phName, phIntent);

    const exList = el('div', `display:flex;flex-direction:column;gap:4px;`);
    ph.exercises.forEach(ex => {
      const row = el('div', `display:flex;align-items:baseline;gap:8px;`);
      const name = el('span', `font-size:13px;color:${T.fg};`);
      name.textContent = ex.name;
      const week1 = el('span', `font-family:${T.mono_ff};font-size:11px;color:${T.mono};margin-left:auto;flex-shrink:0;`);
      week1.textContent = `W1: ${ex.variants[0]}`;
      row.append(name, week1);
      exList.appendChild(row);
    });
    phCard.append(phHdr, exList);
    phaseList.appendChild(phCard);
  });

  daySection.append(dayHdr, phaseList);
  body.appendChild(daySection);
  body.appendChild(renderProgressGrid());

  scroll.appendChild(body);
  root.append(hdr, scroll);
}

// ═══════════════════════════════════════════════════════
// SOUND
// ═══════════════════════════════════════════════════════
async function beep() {
  try {
    const ctx = getAudioCtx();
    if (ctx.state !== 'running') await ctx.resume();
    const t = ctx.currentTime + 0.05;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.setValueAtTime(660, t);
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    o.start(t); o.stop(t + 0.4);
    if (navigator.vibrate) navigator.vibrate([60, 30, 60]);
  } catch {}
}
async function beepTick(freq) {
  try {
    const ctx = getAudioCtx();
    if (ctx.state !== 'running') await ctx.resume();
    const t = ctx.currentTime + 0.05;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.start(t); o.stop(t + 0.17);
  } catch {}
}

// ═══════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════
render();
</script>
