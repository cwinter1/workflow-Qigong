// PALETTE & THEME — B · Restore · Dark (shared design system)
// ═══════════════════════════════════════════════════════
const T = {
  bg:      '#0e1116',
  fg:      '#e8e5dd',
  sub:     '#8a8478',
  card:    '#16191e',

// ═══════════════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════════════
function el(tag, style) {
  const e = document.createElement(tag);
  if (style) e.style.cssText = style;
  return e;
}
function sectionHeader(text) {
  const h = el('div', `font-family:${T.mono_ff};font-size:10px;color:${T.mono};letter-spacing:2px;text-transform:uppercase;`);
  h.textContent = text;
  return h;
}
function renderStat(key, val) {
  const row = el('div', `display:flex;justify-content:space-between;align-items:center;padding:16px;background:${T.card};border:1px solid ${T.hairline};border-radius:6px;`);
  const k = el('div', `font-family:${T.mono_ff};font-size:11px;color:${T.mono};letter-spacing:1.5px;text-transform:uppercase;`);
  k.textContent = key;
  const v = el('div', `font-family:${T.display};font-weight:700;font-size:16px;text-transform:uppercase;letter-spacing:0.5px;`);
  v.textContent = val;
  row.append(k, v);
  return row;
}
function fmt(s) {
  if (s < 0) s = 0;
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════════════
// ICONS
// ═══════════════════════════════════════════════════════
function iconPlay(c)  { return `<svg width="14" height="14" viewBox="0 0 14 14" fill="${c}"><polygon points="3,1 13,7 3,13"/></svg>`; }
function iconPause(c) { return `<svg width="14" height="16" viewBox="0 0 14 16" fill="${c}"><rect x="1" y="1" width="4" height="14" rx="1"/><rect x="9" y="1" width="4" height="14" rx="1"/></svg>`; }
function iconNext(c)  { return `<svg width="14" height="14" viewBox="0 0 14 14" fill="${c}" stroke="${c}" stroke-width="1"><polygon points="2,1 10,7 2,13"/><rect x="11" y="1" width="2" height="12" rx="1"/></svg>`; }
function iconCheck(c) { return `<svg width="16" height="16" viewBox="0 0 16 16" stroke="${c}" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,8 6,12 14,4"/></svg>`; }
function iconClose(c) { return `<svg width="14" height="14" viewBox="0 0 14 14" stroke="${c}" stroke-width="1.5" fill="none" stroke-linecap="round"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>`; }
function iconArrow(c) { return `<svg width="16" height="16" viewBox="0 0 16 16" stroke="${c}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,4 10,8 6,12"/></svg>`; }
function iconSpeaker(c) { return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="${c}" stroke="none"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>`; }
function iconStop(c) { return `<svg width="12" height="12" viewBox="0 0 12 12" fill="${c}"><rect x="1" y="1" width="10" height="10" rx="1.5"/></svg>`; }

// Search query stays in English (nameEn) — most Baduanjin tutorials are in
// English/Chinese, so an English query surfaces better results than a
// Hebrew one for a Chinese-origin movement name.
function youtubeSearchUrl(nameEn) {
  return `https://www.youtube.com/results?search_query=${encodeURIComponent(nameEn + ' baduanjin qigong')}`;
}

// Toggle: tap once to start reading, tap again (or navigate away) to stop
// immediately rather than waiting for the utterance to finish on its own.
let _speakingBtn = null;
function toggleSpeech(text, btn) {
  if (!('speechSynthesis' in window)) return;
  const wasThisBtn = _speakingBtn === btn;
  try { window.speechSynthesis.cancel(); } catch {}
  if (_speakingBtn) { _speakingBtn.innerHTML = iconSpeaker(T.fg); _speakingBtn = null; }
  if (wasThisBtn) return;
  try {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'he-IL';
    utter.rate = 0.92;
    const reset = () => { if (_speakingBtn === btn) { btn.innerHTML = iconSpeaker(T.fg); _speakingBtn = null; } };
    utter.onend = reset;
    utter.onerror = reset;
    btn.innerHTML = iconStop(T.fg);
    _speakingBtn = btn;
    window.speechSynthesis.speak(utter);
  } catch {}
}

// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════

const PROGRAM = {

// ═══════════════════════════════════════════════════════
// MOVEMENT ILLUSTRATIONS — simple built-in stick-figure diagrams.
// No video: no ads, no intros, no loading, works offline, shows instantly.
// ═══════════════════════════════════════════════════════
function svgFigure(inner) {
  return `<svg viewBox="0 0 100 140" width="100%" height="180" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto;">${inner}</svg>`;
}
// frames (optional): a single point-string, or an array of them for movements
// that alternate sides (e.g. punch left, then punch right). The polyline loops
// base→frame1→base→frame2→base... via native SVG SMIL — no JS/CSS keyframes,
// works in Safari.
function bone(basePts, color, frames, dur) {
  let anim = '';
  if (frames) {
    const list = Array.isArray(frames) ? frames : [frames];
    const values = [basePts, ...list.flatMap(f => [f, basePts])].join(';');
    anim = `<animate attributeName="points" values="${values}" dur="${dur || '2.6s'}" repeatCount="indefinite"/>`;
  }
  return `<polyline points="${basePts}" fill="none" stroke="${color}" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">${anim}</polyline>`;
}
function headC(baseCx, baseCy, color, framesCx, framesCy, dur) {
  let animX = '', animY = '';
  if (framesCx != null) {
    const listX = Array.isArray(framesCx) ? framesCx : [framesCx];
    const listY = Array.isArray(framesCy) ? framesCy : [framesCy];
    const valuesX = [baseCx, ...listX.flatMap(v => [v, baseCx])].join(';');
    const valuesY = [baseCy, ...listY.flatMap(v => [v, baseCy])].join(';');
    animX = `<animate attributeName="cx" values="${valuesX}" dur="${dur || '2.6s'}" repeatCount="indefinite"/>`;
    animY = `<animate attributeName="cy" values="${valuesY}" dur="${dur || '2.6s'}" repeatCount="indefinite"/>`;
  }
  return `<circle cx="${baseCx}" cy="${baseCy}" r="9" fill="none" stroke="${color}" stroke-width="4">${animX}${animY}</circle>`;
}
function groundLine() {
  return `<line x1="15" y1="132" x2="85" y2="132" stroke="${T.hairline}" stroke-width="2" stroke-linecap="round"/>`;
}
const LEGS_NARROW = () => bone('50,75 43,105 40,130', T.fg) + bone('50,75 57,105 60,130', T.fg);
const LEGS_HORSE  = () => bone('50,75 30,100 22,130', T.fg) + bone('50,75 70,100 78,130', T.fg);

// On the timer screen (animated=true) the figure loops neutral→pose(s)→neutral
// via SMIL so there's something to move with in real time — the full range of
// the movement, both sides when the exercise alternates. On the preview screen
// (animated=false/undefined) it's a single static reference pose (frames[0]).
function movingBone(neutralPts, activeFrames, color, animated, dur) {
  if (!animated) return bone(Array.isArray(activeFrames) ? activeFrames[0] : activeFrames, color);
  return bone(neutralPts, color, activeFrames, dur);
}
function movingHead(nCx, nCy, activeCxFrames, activeCyFrames, color, animated, dur) {
  if (!animated) {
    const cx = Array.isArray(activeCxFrames) ? activeCxFrames[0] : activeCxFrames;
    const cy = Array.isArray(activeCyFrames) ? activeCyFrames[0] : activeCyFrames;
    return headC(cx, cy, color);
  }
  return headC(nCx, nCy, color, activeCxFrames, activeCyFrames, dur);
}

}

    // Torso sways through both sides of the arc, not just one.

    illo: (animated) => svgFigure(groundLine()
      + movingBone('50,75 43,105 41,120 40,130', '50,75 43,105 39,124 47,136', T.fg, animated, '1.8s')

function phaseSeconds(totalMin) {
  const s = PROGRAM.phaseShare, total = totalMin * 60;
  const out = {};
  Object.keys(s).forEach(id => { out[id] = Math.round(total * s[id]); });
  return out;
}

function buildTimeline(dayIdx, week, totalMin) {
  const day = PROGRAM.days[dayIdx];
  const totals = phaseSeconds(totalMin);
  const out = [];
  day.phases.forEach((ph, pi) => {
    const each = Math.max(20, Math.round(totals[ph.id] / ph.exercises.length));
    ph.exercises.forEach((ex, ei) => {
      out.push({ phaseIdx:pi, phaseId:ph.id, phaseName:ph.name, intent:ph.intent,
        exIdx:ei, exName:ex.name, exNameEn:ex.nameEn, variant:ex.variants[week-1], seconds:each, kind:'exercise' });
    });
  });
  return out;
}

function loadSessions()  { try { return JSON.parse(localStorage.getItem('qf.sessions') || '[]'); } catch { return []; } }
function saveSessions(s) { try { localStorage.setItem('qf.sessions', JSON.stringify(s)); } catch {} }

function getStreak() {
  const sessions = loadSessions();
  if (!sessions.length) return 0;
  const dayKeys = [...new Set(sessions.map(s => {
    const d = new Date(s.at);
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }))].sort();
  const last = new Date(sessions[sessions.length - 1].at);
  const today = new Date(); today.setHours(0,0,0,0); last.setHours(0,0,0,0);
  if ((today - last) / 86400000 > 1) return 0;
  let streak = 1;
  for (let i = dayKeys.length - 2; i >= 0; i--) {
    const a = dayKeys[i].split('-').map(Number);
    const b = dayKeys[i+1].split('-').map(Number);
    const da = new Date(a[0], a[1], a[2]);
    const db = new Date(b[0], b[1], b[2]);
    if ((db - da) / 86400000 === 1) streak++;
    else break;
  }
  return streak;
}

  if (streak === 14) return "שבועיים בלי פער. התרגול מצא את מקומו.";
  if (streak === 10) return "עשרה בקרים ברצף. זה כבר לא מאמץ - זה קצב.";

    "שמונה תרגילים, אותו סדר, בכל פעם. החזרתיות היא הנקודה, לא מגבלה.",
    "לא בונים שקט בתוך התרגול. בונים אותו באיך שהוא נשאר איתכם אחר כך.",
    "עשרים דקות מזה שוות יותר משעה שעושים רק פעמיים בחודש.",
    "הגוף מתיישב לתוך מה שמבקשים ממנו בעקביות. אתם מבקשים.",
    "עקביות בלי עוצמה מנצחת עוצמה בלי עקביות. בכל פעם.",
    "בוצע. עוד בוקר שלא תצטרכו להתחיל בו מאפס שוב.",
    "עבודה שקטה. בלי הצגה. ככה זה נראה.",
    "הרצף הוא תוצר לוואי. הנשימה היא העניין.",
    `${total} אימונים. אתם ממשיכים להגיע.`,
    "עוד אחד נרשם. זה מצטבר בין אם מרגישים את זה היום ובין אם לא.",
    "לא כל אימון מרגיש מיושב. זה נחשב באותה מידה.",
    "הפער בין לרצות לבין לעשות הוא בדיוק זה - עשרים דקות, הבוקר.",
    "עוד אימון מאחוריכם. זה כל התרגול.",
  ];
  return pool[total % pool.length];
}

async function shareSession(streak, total, duration) {
  const text = `תרגול באדואנג'ין, ${Math.round(duration / 60)} דקות - שבוע ${state.week}, יום ${state.day + 1}. ${streak >= 2 ? 'רצף של ' + streak + ' ימים. ' : ''}סה"כ ${total} אימונים.`;
  if (navigator.share) {
    try { await navigator.share({ title: 'Q·Flow', text }); return 'shared'; } catch { return null; }

  try { await navigator.clipboard.writeText(text); return 'copied'; } catch { return null; }
}

// ═══════════════════════════════════════════════════════
// SESSION START
// ═══════════════════════════════════════════════════════
function startSession() {
  clearInterval(timerInterval);
  try {
    const ctx = getAudioCtx();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
  } catch {}
  state.timeline = buildTimeline(state.day, state.week, SESSION_MIN);
  state.idx = 0;
  state.left = state.timeline[0].seconds;
  state.paused = false;
  state.startedAt = Date.now();
  state.view = 'preview';
  acquireWakeLock();
  render();
}

function pickDay(w, d) {
  state.week = w; state.day = d;
  startSession();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (state.paused) return;
    state.left--;
    if (state.left <= 0) {
      clearInterval(timerInterval);
      beep();
      if (state.idx + 1 < state.timeline.length) {
        state.idx++;
        state.left = state.timeline[state.idx].seconds;
        state.view = 'preview';
        render();
      } else {
        finishSession();
      }
    } else {
      if (state.left <= 10 && state.left > 0) beepTick(state.left <= 3 ? 880 : 440);
      updateTimerDisplay();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const cur = state.timeline[state.idx];

  const numEl = document.getElementById('timer-num');
  if (numEl) numEl.textContent = fmt(state.left);

  const progEl = document.getElementById('session-prog');
  if (progEl) {
    const totalSec = state.timeline.reduce((a, t) => a + t.seconds, 0);
    const doneSec = state.timeline.slice(0, state.idx).reduce((a, t) => a + t.seconds, 0) + (cur.seconds - state.left);
    progEl.style.width = `${(doneSec / totalSec) * 100}%`;
  }
}

function togglePause() {
  state.paused = !state.paused;
  const btn = document.getElementById('pause-btn');
  if (btn) btn.innerHTML = `${state.paused ? iconPlay(T.bg) : iconPause(T.bg)} ${state.paused ? 'המשך' : 'השהה'}`;
}

function skipExercise() {
  clearInterval(timerInterval);
  if (state.idx + 1 < state.timeline.length) {
    state.idx++;
    state.left = state.timeline[state.idx].seconds;
    state.view = 'preview';
    render();
  } else {
    finishSession();
  }
}

function abortSession() {
  clearInterval(timerInterval);
  releaseWakeLock();
  const ns2 = nextSession();
  state.week = ns2.week; state.day = ns2.day;
  state.view = 'home';
  render();
}

function finishSession() {
  clearInterval(timerInterval);
  releaseWakeLock();
  const key = `w${state.week}d${state.day}`;
  const now = Date.now();
  const duration = state.startedAt ? Math.round((now - state.startedAt) / 1000) : SESSION_MIN * 60;
  state.progress[key] = { done: true, at: now };
  saveProgress();
  const sessions = loadSessions();
  sessions.push({ key, at: now, duration, week: state.week, day: state.day, dayTitle: PROGRAM.days[state.day].title, dayTag: PROGRAM.days[state.day].tag });
  saveSessions(sessions);
  state.lastDuration = duration;
  state.view = 'done';
  render();
}

  scroll.appendChild(body);

  const ctaWrap = el('div', `padding:14px 22px;padding-bottom:calc(env(safe-area-inset-bottom,14px)+14px);display:flex;gap:10px;flex-shrink:0;`);

  const shareBtn = el('button', `flex:1;appearance:none;border:1px solid ${T.hairline};background:transparent;color:${T.fg};border-radius:6px;padding:18px;font-family:${T.display};font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:0.5px;`);
  shareBtn.textContent = 'שתף';
  shareBtn.onclick = async () => {
    const orig = shareBtn.textContent;
    shareBtn.disabled = true;
    const result = await shareSession(streak, total, duration);
    shareBtn.textContent = result === 'copied' ? 'הועתק' : orig;
    setTimeout(() => { shareBtn.textContent = orig; shareBtn.disabled = false; }, 1500);
  };

  const continueBtn = el('button', `flex:2;appearance:none;border:none;background:${T.accent};color:${T.accentT};border-radius:6px;padding:18px 22px;font-family:${T.display};font-weight:700;font-size:16px;text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;justify-content:center;gap:10px;`);
  continueBtn.innerHTML = `${iconCheck(T.accentT)} המשך`;
  continueBtn.onclick = () => {
    if (sessionRating != null) {
      const sessions = loadSessions();
      const si = sessions.findIndex(s => s.key === sessionKey && s.at === (sessions[sessions.length - 1]?.key === sessionKey ? sessions[sessions.length - 1].at : s.at));
      const lastIdx = sessions.length - 1;
      if (lastIdx >= 0 && sessions[lastIdx].key === sessionKey) { sessions[lastIdx].rating = sessionRating; saveSessions(sessions); }
    }
    const ns2 = nextSession();
    state.week = ns2.week; state.day = ns2.day;
    state.view = 'home';
    render();
  };
  ctaWrap.append(shareBtn, continueBtn);

  root.append(scroll, ctaWrap);
}

// ═══════════════════════════════════════════════════════
// PROGRAM
// ═══════════════════════════════════════════════════════
function renderProgram(root) {
  const hdr = el('div', `padding:calc(env(safe-area-inset-top,12px)+12px) 22px 12px;display:flex;align-items:center;gap:14px;flex-shrink:0;`);
  const backBtn = el('button', `appearance:none;border:1px solid ${T.hairline};background:transparent;color:${T.fg};width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;`);
  backBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" stroke="${T.fg}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,2 4,7 10,12"/></svg>`;
  backBtn.onclick = () => { state.view = 'home'; render(); };
  const title = el('div', `font-family:${T.display};font-weight:700;font-size:22px;text-transform:uppercase;letter-spacing:0.5px;`);
  title.textContent = 'תוכנית 4 השבועות';
  hdr.append(backBtn, title);

  const scroll = el('div', `flex:1;overflow-y:auto;padding:0 22px;`);
  const body = el('div', `display:flex;flex-direction:column;gap:28px;padding-bottom:40px;margin-top:8px;`);

  // All 3 weekly sessions are the same Baduanjin set, so the breakdown is
  // shown once rather than repeated identically per day slot.
  const day = PROGRAM.days[0];
  const daySection = el('div', ``);
  const dayHdr = el('div', `margin-bottom:14px;`);
  const dayTag = el('div', `font-family:${T.mono_ff};font-size:10px;color:${T.accent};letter-spacing:2px;text-transform:uppercase;`);
  dayTag.textContent = `${day.tag} · מתורגל 3 פעמים בשבוע`;
  const dayTitle = el('div', `font-family:${T.display};font-weight:700;font-size:28px;text-transform:uppercase;letter-spacing:-0.5px;line-height:1;margin-top:4px;`);
  dayTitle.textContent = day.title;
  const daySub = el('div', `font-family:${T.mono_ff};font-size:11px;color:${T.mono};margin-top:4px;letter-spacing:1px;`);
  daySub.textContent = day.kicker;
  dayHdr.append(dayTag, dayTitle, daySub);

  const phaseList = el('div', `display:flex;flex-direction:column;gap:6px;`);
  day.phases.forEach((ph, pi) => {
    const phCard = el('div', `background:${T.card};border:1px solid ${T.hairline};border-radius:6px;padding:14px;`);
    const phHdr = el('div', `display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;`);
    const phName = el('div', `font-family:${T.display};font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:0.5px;`);
    phName.textContent = `${pi + 1}. ${ph.name}`;
    const phIntent = el('div', `font-family:${T.mono_ff};font-size:10px;color:${T.mono};letter-spacing:0.5px;max-width:200px;text-align:right;`);
    phIntent.textContent = ph.intent;
    phHdr.append(phName, phIntent);

    const exList = el('div', `display:flex;flex-direction:column;gap:4px;`);
    ph.exercises.forEach(ex => {
      const row = el('div', `display:flex;align-items:baseline;gap:8px;`);
      const name = el('span', `font-size:13px;color:${T.fg};`);
      name.textContent = ex.name;
      const week1 = el('span', `font-family:${T.mono_ff};font-size:11px;color:${T.mono};margin-left:auto;flex-shrink:0;`);
      week1.textContent = `שבוע 1: ${ex.variants[0]}`;
      row.append(name, week1);
      exList.appendChild(row);
    });
    phCard.append(phHdr, exList);
    phaseList.appendChild(phCard);
  });

  daySection.append(dayHdr, phaseList);
  body.appendChild(daySection);
  body.appendChild(renderProgressGrid());

  scroll.appendChild(body);
  root.append(hdr, scroll);
}

// ═══════════════════════════════════════════════════════
// SOUND
// ═══════════════════════════════════════════════════════
async function beep() {
  try {
    const ctx = getAudioCtx();
    if (ctx.state !== 'running') await ctx.resume();
    const t = ctx.currentTime + 0.05;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.setValueAtTime(660, t);
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    o.start(t); o.stop(t + 0.4);
    if (navigator.vibrate) navigator.vibrate([60, 30, 60]);
  } catch {}
}
async function beepTick(freq) {
  try {
    const ctx = getAudioCtx();
    if (ctx.state !== 'running') await ctx.resume();
    const t = ctx.currentTime + 0.05;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.start(t); o.stop(t + 0.17);
  } catch {}
}

// ═══════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════
render();
</script>
